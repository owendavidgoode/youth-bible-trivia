<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Space Bible Trivia | Bridgepoint Bible Church</title>
  <style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@700;900&display=swap');

*, *::before, *::after {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

:root {
  --bg-from: #000008;
  --bg-to: #080020;
  --surface: rgba(0,229,255,0.05);
  --surface-border: rgba(0,229,255,0.12);
  --team1: #00e5ff;
  --team2: #ff2d78;
  --correct: #39ff14;
  --wrong: #ff2d78;
  --gold: #ffe200;
  --text: #e8f4ff;
  --muted: #5580a0;
}

@keyframes bgPulse {
  0%   { background-position: 0% 50%; }
  50%  { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(16px); }
  to   { opacity: 1; transform: translateY(0); }
}


@keyframes scorePop {
  0%   { transform: scale(1); }
  40%  { transform: scale(1.45); filter: brightness(1.6); }
  100% { transform: scale(1); filter: brightness(1); }
}

@keyframes correctPulse {
  0%, 100% { box-shadow: 0 0 12px rgba(57,255,20,0.5); }
  50%       { box-shadow: 0 0 32px rgba(57,255,20,1), 0 0 60px rgba(57,255,20,0.4); }
}

@keyframes buzzFlash {
  0%   { transform: scale(1); }
  30%  { transform: scale(0.93); }
  60%  { transform: scale(1.06); }
  100% { transform: scale(1); }
}

@keyframes confettiFall {
  0%   { transform: translateY(-20px) rotate(0deg); opacity: 1; }
  100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
}

@keyframes winGlow {
  0%, 100% { text-shadow: 0 0 20px currentColor, 0 0 40px currentColor; }
  50%       { text-shadow: 0 0 40px currentColor, 0 0 80px currentColor, 0 0 120px currentColor; }
}

@keyframes playAgainPulse {
  0%, 100% { box-shadow: 0 0 16px var(--gold), 0 0 32px rgba(245,158,11,0.4); }
  50%       { box-shadow: 0 0 32px var(--gold), 0 0 64px rgba(245,158,11,0.6); }
}

@keyframes titleGlow {
  0%, 100% { text-shadow: 0 0 30px rgba(0,229,255,0.8), 0 0 60px rgba(0,229,255,0.35), 0 0 100px rgba(255,45,120,0.2), 0 2px 8px rgba(0,0,0,0.9); }
  50%       { text-shadow: 0 0 50px rgba(0,229,255,1), 0 0 100px rgba(0,229,255,0.55), 0 0 180px rgba(255,45,120,0.35), 0 2px 8px rgba(0,0,0,0.9); }
}

@keyframes neonBorderPulse {
  0%, 100% { box-shadow: 0 8px 24px rgba(0,0,0,0.5), 0 0 12px rgba(0,229,255,0.3); border-color: rgba(0,229,255,0.5); }
  50%       { box-shadow: 0 12px 36px rgba(0,0,0,0.6), 0 0 28px rgba(0,229,255,0.7), 0 0 56px rgba(0,229,255,0.25); border-color: var(--team1); }
}

body {
  background:
    radial-gradient(ellipse 45% 35% at 12% 22%, rgba(0,229,255,0.07) 0%, transparent 70%),
    radial-gradient(ellipse 55% 40% at 85% 68%, rgba(255,45,120,0.06) 0%, transparent 70%),
    radial-gradient(ellipse 35% 28% at 58% 85%, rgba(120,0,220,0.06) 0%, transparent 70%),
    linear-gradient(135deg, var(--bg-from) 0%, #0a0028 35%, #000f1a 65%, var(--bg-to) 100%);
  background-size: 100% 100%, 100% 100%, 100% 100%, 400% 400%;
  animation: bgPulse 18s ease infinite;
  color: var(--text);
  font-family: 'Share Tech Mono', 'Courier New', monospace;
  font-size: 1.125rem;
  line-height: 1.6;
  min-height: 100vh;
}
body::after {
  content: '';
  position: fixed;
  inset: 0;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 3px,
    rgba(0,0,0,0.06) 3px,
    rgba(0,0,0,0.06) 4px
  );
  pointer-events: none;
  z-index: 8000;
}

#starfield {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
  overflow: hidden;
}
.star {
  position: absolute;
  width: 1px;
  height: 1px;
  background: white;
  border-radius: 50%;
  animation: starTwinkle var(--dur, 5s) var(--del, 0s) ease-in-out infinite;
}
@keyframes starTwinkle {
  0%, 100% { opacity: 0.8; transform: scale(1); }
  50%       { opacity: 0.06; transform: scale(0.4); }
}

#app {
  width: 100vw;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  position: relative;
  z-index: 1;
  animation: fadeIn 0.4s ease both;
}

/* ─── Mute Button ─────────────────────────────── */
#mute-btn {
  position: fixed;
  top: 1rem;
  right: 1rem;
  z-index: 1000;
  background: var(--surface);
  border: 1px solid var(--surface-border);
  color: var(--text);
  font-size: 1.4rem;
  width: 2.6rem;
  height: 2.6rem;
  border-radius: 50%;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.2s, box-shadow 0.2s;
  backdrop-filter: blur(8px);
}
#mute-btn:hover {
  background: rgba(255,255,255,0.12);
  box-shadow: 0 0 12px rgba(255,255,255,0.2);
}

/* ─── Bridgepoint Logo ────────────────────────── */
.bp-logo {
  height: 40px;
  object-fit: contain;
  filter: brightness(1.1);
}
.bp-logo-wrap {
  display: flex;
  align-items: center;
  gap: 0.5rem;
}
.bp-logo-fallback {
  font-size: 0.75rem;
  color: var(--muted);
  font-style: italic;
}

/* ─── Setup Screen ────────────────────────────── */
.setup-screen {
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  gap: 2rem;
  padding: 3rem 2rem;
  flex: 1;
  position: relative;
  overflow: hidden;
  animation: fadeIn 0.5s ease both;
}

/* ─── Terminal Background ─────────────────────── */
.terminal-bg {
  position: absolute;
  inset: 0;
  overflow: hidden;
  pointer-events: none;
  opacity: 0.07;
  z-index: 0;
  font-family: 'Share Tech Mono', 'Courier New', monospace;
  font-size: 0.68rem;
  color: var(--team1);
  line-height: 1.9;
  padding: 1rem 2rem;
  white-space: pre;
}
.terminal-scroll {
  animation: terminalScroll 28s linear infinite;
}
@keyframes terminalScroll {
  0%   { transform: translateY(0); }
  100% { transform: translateY(-50%); }
}
.setup-content {
  position: relative;
  z-index: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2rem;
  width: 100%;
}

.setup-logo-row {
  display: flex;
  align-items: center;
  gap: 0.75rem;
  margin-bottom: 0.5rem;
}

.setup-screen h1 {
  font-family: 'Orbitron', sans-serif;
  font-size: 3.2rem;
  font-weight: 900;
  letter-spacing: 0.06em;
  text-align: center;
  cursor: default;
  animation: titleGlow 3s ease infinite;
}
.setup-screen h1:hover::after {
  content: attr(data-tooltip);
  display: block;
  font-size: 0.85rem;
  color: var(--muted);
  font-weight: normal;
  letter-spacing: 0;
  margin-top: 0.25rem;
}

.setup-tagline {
  color: var(--gold);
  font-style: italic;
  font-size: 1.1rem;
  text-align: center;
  margin-top: -1rem;
  opacity: 0.85;
}

.difficulty-row {
  display: flex;
  gap: 1.2rem;
  justify-content: center;
  flex-wrap: wrap;
}

.diff-card {
  background: var(--surface);
  border: 2px solid var(--surface-border);
  border-radius: 1rem;
  padding: 1.2rem 1.6rem;
  cursor: pointer;
  text-align: center;
  min-width: 150px;
  transition: border-color 0.2s, box-shadow 0.2s, transform 0.15s;
  position: relative;
  backdrop-filter: blur(6px);
}
.diff-card:hover {
  border-color: rgba(255,255,255,0.3);
  transform: translateY(-3px);
  box-shadow: 0 8px 24px rgba(0,0,0,0.5);
}
.diff-card.selected {
  border-color: var(--gold);
  box-shadow: 0 0 16px rgba(245,158,11,0.6), 0 0 32px rgba(245,158,11,0.2);
}
.diff-card-label {
  font-size: 1.15rem;
  font-weight: bold;
  color: var(--text);
}
.diff-card-sub {
  font-size: 0.8rem;
  color: var(--muted);
  margin-top: 0.3rem;
}
.diff-card[data-id="bob-stanberry"] .diff-card-label {
  color: var(--gold);
}

.team-inputs {
  display: flex;
  gap: 2rem;
  flex-wrap: wrap;
  justify-content: center;
}

.form-group {
  display: flex;
  flex-direction: column;
  gap: 0.4rem;
}

.form-group label {
  font-size: 0.9rem;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.08em;
}

.form-group input {
  width: 220px;
  padding: 0.75rem 1rem;
  font-size: 1.1rem;
  background: var(--surface);
  color: var(--text);
  border: 2px solid var(--surface-border);
  border-radius: 0.6rem;
  font-family: 'Share Tech Mono', 'Courier New', monospace;
  transition: border-color 0.2s;
  backdrop-filter: blur(4px);
}
.form-group input:focus {
  outline: none;
  border-color: rgba(255,255,255,0.35);
}
.form-group input::placeholder {
  color: var(--muted);
}

.start-btn {
  padding: 1rem 2.5rem;
  font-size: 1.3rem;
  font-weight: bold;
  font-family: 'Share Tech Mono', 'Courier New', monospace;
  background: linear-gradient(135deg, #007a8a, #00b8d4, #00e5ff);
  color: #000c10;
  border: none;
  border-radius: 0.75rem;
  cursor: pointer;
  letter-spacing: 0.04em;
  transition: opacity 0.2s, transform 0.15s, box-shadow 0.2s;
  box-shadow: 0 0 24px rgba(0,229,255,0.5), 0 0 48px rgba(0,229,255,0.2);
}
.start-btn:hover:not(:disabled) {
  opacity: 0.9;
  transform: translateY(-2px);
  box-shadow: 0 0 40px rgba(0,229,255,0.8), 0 0 80px rgba(0,229,255,0.3);
}
.start-btn:disabled {
  opacity: 0.35;
  cursor: not-allowed;
}

/* ─── Scoreboard ──────────────────────────────── */
.scoreboard {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 1rem 1.5rem 0.5rem;
  background: rgba(0,0,0,0.3);
  border-bottom: 1px solid var(--surface-border);
  backdrop-filter: blur(8px);
  gap: 1rem;
  position: sticky;
  top: 0;
  z-index: 50;
}

.score-block {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0.1rem;
  min-width: 120px;
}
.score-block.team1 { color: var(--team1); }
.score-block.team2 { color: var(--team2); }

.score-name {
  font-size: 0.85rem;
  font-weight: bold;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  opacity: 0.8;
}
.score-value {
  font-family: 'Orbitron', sans-serif;
  font-size: 3.5rem;
  font-weight: 700;
  line-height: 1;
  filter: drop-shadow(0 0 10px currentColor) drop-shadow(0 0 24px currentColor);
}
.score-value.popping {
  animation: scorePop 0.5s ease both;
}

.scoreboard-center {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0.25rem;
}
.scoreboard-center .bp-logo-wrap {
  margin-bottom: 0.2rem;
}
.picking-label {
  font-size: 0.85rem;
  color: var(--muted);
}
.picking-team {
  font-size: 1rem;
  font-weight: bold;
  color: var(--gold);
}

/* ─── Battlefield Bar ─────────────────────────── */
.battlefield-wrap {
  position: relative;
  width: 100%;
  height: 12px;
  background: var(--surface);
  overflow: hidden;
}
.battlefield-bar {
  position: absolute;
  top: 0;
  left: 0;
  height: 100%;
  background: linear-gradient(90deg, #007a8a, var(--team1));
  transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
  box-shadow: 2px 0 16px rgba(0,229,255,0.9);
}
.battlefield-right {
  position: absolute;
  top: 0;
  right: 0;
  height: 100%;
  background: linear-gradient(270deg, #cc0055, var(--team2));
  transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
  box-shadow: -2px 0 16px rgba(255,45,120,0.9);
}
.battlefield-shimmer {
  animation: battlefieldShimmer 0.6s ease both;
}
@keyframes battlefieldShimmer {
  0%   { filter: brightness(1); }
  40%  { filter: brightness(2.5); }
  100% { filter: brightness(1); }
}

/* ─── Category Board ──────────────────────────── */
.category-board {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 2rem;
  flex: 1;
  gap: 2rem;
  animation: fadeIn 0.4s ease both;
}

.category-board-title {
  font-size: 1.3rem;
  color: var(--muted);
  text-align: center;
}
.category-board-title strong {
  font-size: 1.5rem;
  color: var(--gold);
}

.category-grid {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  grid-template-rows: 1fr 1fr;
  gap: 1.25rem;
  width: 100%;
  max-width: 800px;
  flex: 1;
}

.category-card {
  background: var(--surface);
  border: 2px solid var(--surface-border);
  border-radius: 1rem;
  padding: 1.5rem;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 0.75rem;
  cursor: pointer;
  transition: transform 0.15s, border-color 0.2s, box-shadow 0.2s;
  text-align: center;
  backdrop-filter: blur(6px);
  animation: fadeIn 0.4s ease both;
  position: relative;
  overflow: hidden;
}
.category-card:hover:not(.exhausted) {
  transform: translateY(-4px);
  animation: neonBorderPulse 1.4s ease infinite;
}
.category-card.exhausted {
  opacity: 0.38;
  cursor: not-allowed;
  filter: grayscale(0.7);
}
.category-card-emoji {
  font-size: 2.2rem;
  line-height: 1;
}
.category-card-label {
  font-size: 1rem;
  font-weight: bold;
  letter-spacing: 0.03em;
}
.category-card-count {
  font-size: 0.75rem;
  color: var(--muted);
}
.exhausted-overlay {
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.55);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.8rem;
  color: var(--muted);
  border-radius: 1rem;
}

/* ─── Question Screen ─────────────────────────── */
.question-screen {
  display: flex;
  flex-direction: column;
  flex: 1;
  padding: 1.5rem 2rem;
  gap: 1.5rem;
  animation: fadeIn 0.35s ease both;
}

.question-category-badge {
  text-align: center;
  font-size: 0.85rem;
  color: var(--gold);
  text-transform: uppercase;
  letter-spacing: 0.12em;
}

.question-card {
  background: var(--surface);
  border: 1px solid var(--surface-border);
  border-radius: 1rem;
  padding: 2rem;
  text-align: center;
  font-size: 1.6rem;
  line-height: 1.5;
  backdrop-filter: blur(8px);
  box-shadow: 0 4px 24px rgba(0,0,0,0.4);
  max-width: 900px;
  margin: 0 auto;
  width: 100%;
}

.options-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1rem;
  max-width: 900px;
  margin: 0 auto;
  width: 100%;
}

.option-card {
  background: var(--surface);
  border: 2px solid var(--surface-border);
  border-radius: 0.75rem;
  padding: 1rem 1.25rem;
  font-size: 1.1rem;
  display: flex;
  align-items: center;
  gap: 0.75rem;
  backdrop-filter: blur(4px);
  transition: border-color 0.2s, box-shadow 0.2s;
  cursor: default;
}
.option-card.correct {
  border-color: var(--correct);
  background: rgba(34,197,94,0.12);
  color: var(--correct);
  animation: correctPulse 1.2s ease infinite;
}
.option-label {
  font-weight: bold;
  font-size: 0.9rem;
  min-width: 1.6rem;
  height: 1.6rem;
  border-radius: 50%;
  background: rgba(255,255,255,0.1);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}

/* ─── Lock-In Button ──────────────────────────── */
.lock-in-area {
  display: flex;
  justify-content: center;
  padding: 0.5rem 0;
}
.lock-in-btn {
  padding: 1rem 3rem;
  font-size: 1.4rem;
  font-weight: bold;
  font-family: 'Share Tech Mono', 'Courier New', monospace;
  background: linear-gradient(135deg, #7a5500, #ffe200);
  color: #1a1000;
  border: none;
  border-radius: 0.75rem;
  cursor: pointer;
  letter-spacing: 0.06em;
  transition: opacity 0.2s, transform 0.15s, box-shadow 0.2s;
  box-shadow: 0 0 28px rgba(255,226,0,0.5);
}
.lock-in-btn:hover:not(:disabled) {
  transform: translateY(-2px) scale(1.03);
  box-shadow: 0 0 48px rgba(255,226,0,0.85);
}
.lock-in-btn:disabled {
  background: var(--surface);
  color: var(--muted);
  border: 2px solid var(--surface-border);
  box-shadow: none;
  cursor: not-allowed;
  opacity: 0.45;
}
.lock-in-btn.continue {
  background: linear-gradient(135deg, #004a55, #00b8d4, #00e5ff);
  color: #001820;
  box-shadow: 0 0 24px rgba(0,229,255,0.5);
}
.lock-in-btn.continue:hover {
  box-shadow: 0 0 44px rgba(0,229,255,0.85);
}

/* ─── Selected answer state ───────────────────── */
.answer-btn.selected.team1 {
  background: rgba(0,229,255,0.22);
  border-color: var(--team1);
  box-shadow: 0 0 14px rgba(0,229,255,0.55);
}
.answer-btn.selected.team2 {
  background: rgba(255,45,120,0.22);
  border-color: var(--team2);
  box-shadow: 0 0 14px rgba(255,45,120,0.55);
}

/* ─── Question Reveal ─────────────────────────── */
.reveal-results {
  display: flex;
  flex-direction: column;
  gap: 0.5rem;
  max-width: 900px;
  margin: auto auto 0;
  width: 100%;
}
.reveal-team-row {
  display: flex;
  align-items: center;
  gap: 0.75rem;
  padding: 0.65rem 1rem;
  border-radius: 0.5rem;
  background: var(--surface);
  border: 1px solid var(--surface-border);
}
.reveal-team-name {
  font-weight: bold;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  font-size: 0.82rem;
  min-width: 80px;
}
.reveal-team-name.team1 { color: var(--team1); }
.reveal-team-name.team2 { color: var(--team2); }
.reveal-answer-text {
  flex: 1;
  font-size: 0.92rem;
  color: var(--text);
}
.reveal-verdict {
  font-weight: bold;
  font-size: 1.1rem;
}
.reveal-verdict.correct { color: var(--correct); }
.reveal-verdict.wrong   { color: var(--wrong); }
.result-message {
  text-align: center;
  padding: 0.4rem;
  font-size: 1rem;
  color: var(--gold);
  font-style: italic;
}
.pick-indicators {
  margin-left: auto;
  display: flex;
  gap: 0.2rem;
}
.pick-dot {
  width: 1.3rem;
  height: 1.3rem;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.65rem;
  font-weight: bold;
}
.pick-dot.team1 { background: rgba(0,229,255,0.2); border: 1px solid var(--team1); color: var(--team1); }
.pick-dot.team2 { background: rgba(255,45,120,0.2); border: 1px solid var(--team2); color: var(--team2); }

/* ─── Laser Flash Overlay ─────────────────────── */
@keyframes laserFlashAnim {
  0%   { opacity: 0; }
  12%  { opacity: 1; }
  72%  { opacity: 1; }
  100% { opacity: 0; }
}
.laser-flash-overlay {
  position: fixed;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  background: rgba(0,0,8,0.88);
  z-index: 300;
  animation: laserFlashAnim 2.5s ease both;
  pointer-events: none;
}
.laser-flash-overlay img {
  max-height: 60vh;
  max-width: 65vw;
  border-radius: 0.75rem;
  box-shadow: 0 0 60px rgba(0,229,255,0.35), 0 0 120px rgba(255,45,120,0.2);
  animation: colorReveal 1.5s ease-in both;
}

/* ─── Win Screen ──────────────────────────────── */
.win-screen {
  position: fixed;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: rgba(0,0,8,0.97);
  z-index: 1100;
  gap: 1.5rem;
  padding: 2rem;
  text-align: center;
  animation: fadeIn 0.5s ease both;
  overflow: hidden;
}

.win-title {
  font-size: 1.2rem;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.15em;
  position: relative;
  z-index: 1;
}

.win-winner-name {
  font-size: 4rem;
  font-weight: bold;
  line-height: 1.1;

  font-size: 1.1rem;
  opacity: 0.9;

.win-scores {
  display: flex;
  gap: 3rem;
  font-size: 1.5rem;
  position: relative;

}

  font-weight: bold;
  font-family: 'Share Tech Mono', 'Courier New', monospace;

.splash-screen {
  position: fixed;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 2.5rem;
  background: linear-gradient(135deg, #050510 0%, #0d0020 50%, #050510 100%);

  padding: 2rem;
}

  font-weight: bold;
  letter-spacing: 0.06em;

  font-size: 1.1rem;
  color: var(--muted);
  font-style: italic;
}
.splash-buttons {
  display: flex;
  gap: 2rem;
}
.splash-yes {
  padding: 1.1rem 3rem;
  font-size: 1.5rem;
  font-weight: bold;
  font-family: 'Share Tech Mono', 'Courier New', monospace;
  background: linear-gradient(135deg, #004a55, #00b8d4, #00e5ff);
  color: #001820;
  border: none;
  border-radius: 0.75rem;
  cursor: pointer;
  box-shadow: 0 0 28px rgba(0,229,255,0.6), 0 0 56px rgba(0,229,255,0.2);
  transition: transform 0.15s, box-shadow 0.2s;
  letter-spacing: 0.05em;
}
.splash-yes:hover {
  transform: translateY(-3px) scale(1.04);
  box-shadow: 0 0 48px rgba(0,229,255,0.9), 0 0 96px rgba(0,229,255,0.4);
}

  padding: 1.1rem 3rem;
  font-size: 1.5rem;
  font-weight: bold;
  font-family: 'Share Tech Mono', 'Courier New', monospace;
  background: var(--surface);
  color: var(--muted);
  border: 2px solid var(--surface-border);
  border-radius: 0.75rem;
  cursor: pointer;
  transition: transform 0.15s, opacity 0.2s;
}
.splash-no:hover {
  opacity: 0.7;
  transform: translateY(1px);
}

/* ─── Laser Mike Reveal ───────────────────────── */
@keyframes laserScreenAnim {
  0%   { opacity: 0; }
  12%  { opacity: 1; }
  72%  { opacity: 1; }
  100% { opacity: 0; }
}
@keyframes colorReveal {
  0%   { filter: brightness(5) saturate(0) contrast(3); }
  25%  { filter: brightness(2) saturate(0) contrast(1.8); }
  60%  { filter: brightness(1.3) saturate(0.4) contrast(1.2); }
  100% { filter: brightness(1) saturate(1) contrast(1); }
}
.laser-screen {
  position: fixed;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  background: #000;
  z-index: 500;
  animation: laserScreenAnim 3s ease both;
}
.laser-img {
  max-height: 70vh;
  max-width: 75vw;
  width: auto;
  height: auto;
  object-fit: contain;
  border-radius: 1rem;
  box-shadow: 0 0 60px rgba(0,229,255,0.3), 0 0 120px rgba(255,45,120,0.15);
  animation: colorReveal 2s ease-in both;
}

.team-answer-section {
  display: flex;
  flex-direction: column;
  gap: 0.75rem;
  max-width: 900px;
  margin: auto auto 0;
  width: 100%;
}

  display: flex;
  align-items: center;
  gap: 0.6rem;
}

  opacity: 0.28;
  pointer-events: none;
}
.team-answer-label {
  font-size: 0.85rem;
  font-weight: bold;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  min-width: 90px;
  flex-shrink: 0;
}
.team-answer-label.team1 { color: var(--team1); }
.team-answer-label.team2 { color: var(--team2); }
.answer-btn {
  flex: 1;
  padding: 0.85rem 0;
  font-size: 1.2rem;
  font-weight: bold;
  font-family: 'Share Tech Mono', 'Courier New', monospace;
  border-radius: 0.6rem;
  cursor: pointer;
  transition: transform 0.1s, box-shadow 0.15s, border-color 0.15s;
  letter-spacing: 0.06em;
}
.answer-btn.team1 {
  background: rgba(0,229,255,0.08);
  border: 2px solid rgba(0,229,255,0.25);
  color: var(--team1);
}
.answer-btn.team1:hover:not(:disabled) {
  border-color: var(--team1);
  box-shadow: 0 0 16px rgba(0,229,255,0.5);
  transform: translateY(-2px);
  background: rgba(0,229,255,0.15);

  background: rgba(255,45,120,0.08);
  border: 2px solid rgba(255,45,120,0.25);
  color: var(--team2);
}
.answer-btn.team2:hover:not(:disabled) {

  box-shadow: 0 0 16px rgba(255,45,120,0.5);
  transform: translateY(-2px);
  background: rgba(255,45,120,0.15);

  opacity: 0.3;
  cursor: not-allowed;
}
.option-card.wrong-pick {
  border-color: var(--wrong);
  background: rgba(255,45,120,0.1);
  color: var(--wrong);

/* ─── Confetti ────────────────────────────────── */
.confetti-piece {
  position: absolute;
  top: -30px;
  border-radius: 2px;
  animation: confettiFall linear infinite;
  pointer-events: none;

    function shuffle(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {

        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

      return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');

    // ─── 4. Audio Module ───────────────────────────────────────────────────────
    let audioCtx = null;

    function getAudioCtx() {
      if (!audioCtx) {
        try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {}
      }
      return audioCtx;
    }

    function playTone(freq, duration, type = 'sine', volume = 0.3, startDelay = 0) {
      if (state.muted) return;
      const ctx = getAudioCtx();
      if (!ctx) return;
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.type = type;
      osc.frequency.setValueAtTime(freq, ctx.currentTime + startDelay);
      gain.gain.setValueAtTime(volume, ctx.currentTime + startDelay);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + startDelay + duration);
      osc.onended = () => { osc.disconnect(); gain.disconnect(); };
      osc.start(ctx.currentTime + startDelay);
      osc.stop(ctx.currentTime + startDelay + duration + 0.05);
    }

      const t1opt = state.teamAnswers[0];

      const t1correct = t1opt !== null && q.shuffledOptions[t1opt] === q.answer;

      const t1name = state.team1 || 'Team 1';

      let resultMsg = '';
      if (bothCorrect) resultMsg = "Both teams got it \u2014 nobody scores. It's a wash!";
      else if (t1correct) resultMsg = `${escapeHtml(t1name)} got it right! +1`;
      else if (t2correct) resultMsg = `${escapeHtml(t2name)} got it right! +1`;
      else resultMsg = WRONG_FLAVORS[state.wrongFlavorIndex % WRONG_FLAVORS.length];
      app.innerHTML = `
        ${renderHeader()}
        <div class="question-screen">
          <div class="question-category-badge">${escapeHtml(catLabel)}</div>
          <div class="question-card">${escapeHtml(q.q)}</div>
          <div class="options-grid">
            ${q.shuffledOptions.map((opt, i) => {
              const isAns = opt === q.answer;
              const t1picked = i === t1opt;
              const t2picked = i === t2opt;
              const dots = (t1picked || t2picked) ? `<span class="pick-indicators">${t1picked ? `<span class="pick-dot team1">${t1correct ? '\u2713' : '\u2717'}</span>` : ''}${t2picked ? `<span class="pick-dot team2">${t2correct ? '\u2713' : '\u2717'}</span>` : ''}</span>` : '';
              return `<div class="option-card${isAns ? ' correct' : ''}"><span class="option-label">${labels[i]}</span>${escapeHtml(opt)}${dots}</div>`;
            }).join('')}
          </div>
          <div class="reveal-results">
            <div class="reveal-team-row">
              <span class="reveal-team-name team1">${escapeHtml(t1name)}</span>
              <span class="reveal-answer-text">${t1opt !== null ? `${labels[t1opt]}: ${escapeHtml(q.shuffledOptions[t1opt])}` : '\u2014'}</span>
              <span class="reveal-verdict ${t1correct ? 'correct' : 'wrong'}">${t1correct ? '\u2713 +1' : '\u2717 0'}</span>
            </div>
            <div class="reveal-team-row">
              <span class="reveal-team-name team2">${escapeHtml(t2name)}</span>
              <span class="reveal-answer-text">${t2opt !== null ? `${labels[t2opt]}: ${escapeHtml(q.shuffledOptions[t2opt])}` : '\u2014'}</span>
              <span class="reveal-verdict ${t2correct ? 'correct' : 'wrong'}">${t2correct ? '\u2713 +1' : '\u2717 0'}</span>
            </div>
            <div class="result-message">${resultMsg}</div>
            <div class="lock-in-area">
              <button class="lock-in-btn continue" id="continue-btn">Continue &rarr;</button>
            </div>
          </div>
          ${bothCorrect ? '<div class="laser-flash-overlay"><img src="laser-mike.JPG" alt=""></div>' : ''}
        </div>
      `;
      bindEvents();
    }

    // ─── 9. renderWin ─────────────────────────────────────────────────────────
    function renderWin() {
      const app = document.getElementById('app');
      const winnerIdx = state.scores[0] >= WIN_SCORE ? 0 : 1;
      const winnerName = winnerIdx === 0 ? (state.team1 || 'Team 1') : (state.team2 || 'Team 2');
      const winnerClass = winnerIdx === 0 ? 'team1' : 'team2';
      const loserScore = state.scores[winnerIdx === 0 ? 1 : 0];
      const isPerfect = loserScore === 0;
      const tagline = isPerfect
        ? "Michael is crying somewhere right now."
        : "Even Michael couldn't argue with that score.";

      const confettiColors = [
        '#f59e0b','#3b82f6','#ef4444','#22c55e','#a855f7','#ec4899','#06b6d4','#f97316'
      ];
      const confettiHtml = Array.from({ length: CONFETTI_COUNT }, (_, i) => {
        const color = confettiColors[i % confettiColors.length];
        const size = 8 + Math.floor(Math.random() * 10);
        const left = Math.random() * 100;
        const delay = (Math.random() * 4).toFixed(2);
        const duration = (3 + Math.random() * 3).toFixed(2);
        return `<div class="confetti-piece" style="left:${left.toFixed(1)}%;width:${size}px;height:${size * 0.6}px;background:${color};animation-duration:${duration}s;animation-delay:${delay}s;"></div>`;
      }).join('');

      app.innerHTML = `
        <div class="win-screen">
          ${confettiHtml}
          <div class="win-title">&#9733; Space Bible Trivia &#9733;</div>
          <div class="win-winner-name ${winnerClass}">${escapeHtml(winnerName)} wins!</div>
          <div class="win-scores">
            <div class="win-score-block team1">
              <span>${escapeHtml(state.team1 || 'Team 1')}</span>
              <span class="win-score-val">${state.scores[0]}</span>
            </div>
            <div class="win-score-block team2">
              <span>${escapeHtml(state.team2 || 'Team 2')}</span>
              <span class="win-score-val">${state.scores[1]}</span>
            </div>
          </div>
          <div class="win-tagline">${escapeHtml(tagline)}</div>
          <button class="play-again-btn" id="play-again-btn">Play Again</button>
        </div>
      `;
      sfxWin();
      bindEvents();
    }

    // ─── 10. Game Logic ────────────────────────────────────────────────────────
    function resetGameState() {
      state.scores = [0, 0];
      state.pickingTeam = 0;
      state.currentQuestion = null;
      state.currentCategory = null;
      state.teamAnswers = [null, null];
      state.usedQuestions = {};
      state.wrongFlavorIndex = 0;
      state.buzzedTeam = null;
    }

    function startGame() {
      const t1 = document.getElementById('team1-input')?.value.trim() || 'Team 1';
      const t2 = document.getElementById('team2-input')?.value.trim() || 'Team 2';
      state.team1 = t1;
      state.team2 = t2;
      resetGameState();
      state.phase = 'category-board';
      initBgMusic();
      render();
    }

    function pickCategory(categoryId) {
      const q = getRandomQuestion(categoryId);
      if (!q) return;
      state.currentCategory = categoryId;
      state.currentQuestion = q;
      state.teamAnswers = [null, null];
      state.phase = 'question';
      render();
    }

    function getRandomQuestion(categoryId) {
      const pool = QUESTION_BANK[categoryId][state.difficulty];
      if (!state.usedQuestions[categoryId]) {
        state.usedQuestions[categoryId] = new Set();
      }
      const used = state.usedQuestions[categoryId];
      const available = pool.map((_, i) => i).filter(i => !used.has(i));
      if (available.length === 0) return null;
      const idx = available[Math.floor(Math.random() * available.length)];
      used.add(idx);
      const q = pool[idx];
      return {
        q: q.q,
        options: q.options,
        answer: q.answer,
        shuffledOptions: shuffle(q.options),
      };
    }

    function handleTeamSelect(teamIndex, optIndex) {
      state.teamAnswers[teamIndex] = optIndex;
      render();
    }

    function handleLockIn() {
      const q = state.currentQuestion;
      const t1correct = state.teamAnswers[0] !== null && q.shuffledOptions[state.teamAnswers[0]] === q.answer;
      const t2correct = state.teamAnswers[1] !== null && q.shuffledOptions[state.teamAnswers[1]] === q.answer;
      const bothCorrect = t1correct && t2correct;
      const noneCorrect = !t1correct && !t2correct;
      if (t1correct) state.scores[0]++;
      if (t2correct) state.scores[1]++;
      if (bothCorrect) {
        sfxWin();
      } else if (t1correct || t2correct) {
        sfxCorrect();
        sfxPoint();
      } else {
        sfxWrong();
        state.wrongFlavorIndex++;
      }
      if (checkWin()) { state.phase = 'win'; render(); return; }
      state.phase = 'question-reveal';
      render();
      if (t1correct) {
        const el = document.getElementById('score-val-0');
        if (el) { void el.offsetWidth; el.classList.add('popping'); }
      }
      if (t2correct) {
        const el = document.getElementById('score-val-1');
        if (el) { void el.offsetWidth; el.classList.add('popping'); }
      }
      if (t1correct || t2correct) {
        document.querySelector('.battlefield-bar')?.classList.add('battlefield-shimmer');
        document.querySelector('.battlefield-right')?.classList.add('battlefield-shimmer');
      }
    }

    function handleContinue() {
      advancePickingTeam();
      state.teamAnswers = [null, null];
      state.phase = 'category-board';
      render();
    }

    function advancePickingTeam() {
      state.pickingTeam = state.pickingTeam === 0 ? 1 : 0;
    }

    function checkWin() {
      return state.scores[0] >= WIN_SCORE || state.scores[1] >= WIN_SCORE;
    }

    // ─── 11. render() dispatch + bindEvents() ─────────────────────────────────
    function renderSplash() {
      const app = document.getElementById('app');
      app.innerHTML = `
        <div class="splash-screen">
          ${terminalBgHtml()}
          <img src="sbt-logo.png" alt="Space Bible Trivia" style="position:relative;z-index:1;max-height:220px;max-width:80vw;object-fit:contain;margin-bottom:1.5rem;">
          <div class="splash-question" style="position:relative;z-index:1;">Are you ready?</div>
          <div class="splash-buttons" style="position:relative;z-index:1;">
            <button class="splash-yes" id="splash-yes">Yes</button>
            <button class="splash-no" id="splash-no">No</button>
          </div>
        </div>
      `;
      bindEvents();
    }

    function renderLaserMike() {
      const app = document.getElementById('app');
      app.innerHTML = `
        <div class="laser-screen">
          <img class="laser-img" src="laser-mike.JPG" alt="Laser Mike">
        </div>
      `;
      setTimeout(() => { state.phase = 'setup'; render(); }, 3100);
    }

    function render() {
      switch (state.phase) {
        case 'splash':          renderSplash();         break;
        case 'laser-reveal':    renderLaserMike();      break;
        case 'setup':           renderSetup();          break;
        case 'category-board':  renderCategoryBoard();  break;
        case 'question':        renderQuestion();       break;
        case 'question-reveal': renderQuestionReveal(); break;
        case 'win':             renderWin();            break;
        default:                state.phase = 'setup'; renderSetup(); break;
      }
    }

    function bindEvents() {
      document.querySelectorAll('.diff-card').forEach(card => {
        card.addEventListener('click', () => {
          state.difficulty = card.dataset.id;
          document.querySelectorAll('.diff-card').forEach(c => c.classList.remove('selected'));
          card.classList.add('selected');
          const startBtn = document.getElementById('start-btn');
          if (startBtn) startBtn.disabled = false;
        });
      });

      document.getElementById('start-btn')?.addEventListener('click', (e) => {
        e.preventDefault();
        if (!state.difficulty) return;
        startGame();
      });

      document.querySelectorAll('.category-card:not(.exhausted)').forEach(card => {
        card.addEventListener('click', () => {
          pickCategory(card.dataset.category);
        });
      });

      document.querySelectorAll('.answer-btn:not([disabled])').forEach(btn => {
        btn.addEventListener('click', function() {
          handleTeamSelect(parseInt(this.dataset.team, 10), parseInt(this.dataset.opt, 10));
        });
      });

      document.getElementById('lock-in-btn')?.addEventListener('click', handleLockIn);
      document.getElementById('continue-btn')?.addEventListener('click', handleContinue);

      document.getElementById('play-again-btn')?.addEventListener('click', () => {
        resetGameState();
        state.phase = 'setup';
        render();
      });

      document.getElementById('mute-btn')?.addEventListener('click', toggleMute);

      document.getElementById('splash-yes')?.addEventListener('click', () => {
        try { sessionStorage.setItem('gameReady', '1'); } catch(e) {}
        initBgMusic();
        state.phase = 'laser-reveal';
        render();
      });

      document.getElementById('splash-no')?.addEventListener('click', () => {
        window.location.href = 'https://finance.yahoo.com';
      });
    }

    // ─── 12. Starfield + Kick off ─────────────────────────────────────────────
    (function createStarfield() {
      const sf = document.createElement('div');
      sf.id = 'starfield';
      for (let i = 0; i < 90; i++) {
        const s = document.createElement('div');
        s.className = 'star';
        s.style.left = (Math.random() * 100).toFixed(2) + '%';
        s.style.top  = (Math.random() * 100).toFixed(2) + '%';
        s.style.setProperty('--dur', (3 + Math.random() * 7).toFixed(1) + 's');
        s.style.setProperty('--del', (Math.random() * 10).toFixed(1) + 's');
        if (Math.random() < 0.15) { s.style.width = '2px'; s.style.height = '2px'; }
        sf.appendChild(s);
      }
      document.body.insertBefore(sf, document.getElementById('app'));
    })();

    let gameReady = false;
    try { gameReady = !!sessionStorage.getItem('gameReady'); } catch(e) {}
    state.phase = gameReady ? 'setup' : 'splash';
    render();
  </script>
</body>
</html>
