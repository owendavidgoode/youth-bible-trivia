<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Better Quiz Than Michael's | Bridgepoint Bible Church</title>
  <style>
*, *::before, *::after {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

:root {
  --bg-from: #000008;
  --bg-to: #080020;
  --surface: rgba(0,229,255,0.05);
  --surface-border: rgba(0,229,255,0.12);
  --team1: #00e5ff;
  --team2: #ff2d78;
  --correct: #39ff14;
  --wrong: #ff2d78;
  --gold: #ffe200;
  --text: #e8f4ff;
  --muted: #5580a0;
}

@keyframes bgPulse {
  0%   { background-position: 0% 50%; }
  50%  { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(16px); }
  to   { opacity: 1; transform: translateY(0); }
}

@keyframes shake {
  0%, 100% { transform: translateX(0); }
  15%       { transform: translateX(-8px); }
  30%       { transform: translateX(8px); }
  45%       { transform: translateX(-6px); }
  60%       { transform: translateX(6px); }
  75%       { transform: translateX(-3px); }
  90%       { transform: translateX(3px); }
}

@keyframes scorePop {
  0%   { transform: scale(1); }
  40%  { transform: scale(1.45); filter: brightness(1.6); }
  100% { transform: scale(1); filter: brightness(1); }
}

@keyframes correctPulse {
  0%, 100% { box-shadow: 0 0 12px rgba(57,255,20,0.5); }
  50%       { box-shadow: 0 0 32px rgba(57,255,20,1), 0 0 60px rgba(57,255,20,0.4); }
}

@keyframes buzzFlash {
  0%   { transform: scale(1); }
  30%  { transform: scale(0.93); }
  60%  { transform: scale(1.06); }
  100% { transform: scale(1); }
}

@keyframes confettiFall {
  0%   { transform: translateY(-20px) rotate(0deg); opacity: 1; }
  100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
}

@keyframes winGlow {
  0%, 100% { text-shadow: 0 0 20px currentColor, 0 0 40px currentColor; }
  50%       { text-shadow: 0 0 40px currentColor, 0 0 80px currentColor, 0 0 120px currentColor; }
}

@keyframes playAgainPulse {
  0%, 100% { box-shadow: 0 0 16px var(--gold), 0 0 32px rgba(245,158,11,0.4); }
  50%       { box-shadow: 0 0 32px var(--gold), 0 0 64px rgba(245,158,11,0.6); }
}

body {
  background: linear-gradient(135deg, var(--bg-from) 0%, #0a0028 35%, #000f1a 65%, var(--bg-to) 100%);
  background-size: 400% 400%;
  animation: bgPulse 18s ease infinite;
  color: var(--text);
  font-family: 'Georgia', serif;
  font-size: 1.125rem;
  line-height: 1.6;
  min-height: 100vh;
}

#app {
  width: 100vw;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  animation: fadeIn 0.4s ease both;
}

/* ─── Mute Button ─────────────────────────────── */
#mute-btn {
  position: fixed;
  top: 1rem;
  right: 1rem;
  z-index: 1000;
  background: var(--surface);
  border: 1px solid var(--surface-border);
  color: var(--text);
  font-size: 1.4rem;
  width: 2.6rem;
  height: 2.6rem;
  border-radius: 50%;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.2s, box-shadow 0.2s;
  backdrop-filter: blur(8px);
}
#mute-btn:hover {
  background: rgba(255,255,255,0.12);
  box-shadow: 0 0 12px rgba(255,255,255,0.2);
}

/* ─── Bridgepoint Logo ────────────────────────── */
.bp-logo {
  height: 40px;
  object-fit: contain;
  filter: brightness(1.1);
}
.bp-logo-wrap {
  display: flex;
  align-items: center;
  gap: 0.5rem;
}
.bp-logo-fallback {
  font-size: 0.75rem;
  color: var(--muted);
  font-style: italic;
}

/* ─── Setup Screen ────────────────────────────── */
.setup-screen {
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  gap: 2rem;
  padding: 3rem 2rem;
  flex: 1;
  animation: fadeIn 0.5s ease both;
}

.setup-logo-row {
  display: flex;
  align-items: center;
  gap: 0.75rem;
  margin-bottom: 0.5rem;
}

.setup-screen h1 {
  font-size: 3.5rem;
  letter-spacing: 0.04em;
  text-shadow: 0 0 30px rgba(0,229,255,0.8), 0 0 60px rgba(0,229,255,0.35), 0 0 100px rgba(255,45,120,0.2), 0 2px 8px rgba(0,0,0,0.9);
  text-align: center;
  cursor: default;
}
.setup-screen h1:hover::after {
  content: attr(data-tooltip);
  display: block;
  font-size: 0.85rem;
  color: var(--muted);
  font-weight: normal;
  letter-spacing: 0;
  margin-top: 0.25rem;
}

.setup-tagline {
  color: var(--gold);
  font-style: italic;
  font-size: 1.1rem;
  text-align: center;
  margin-top: -1rem;
  opacity: 0.85;
}

.difficulty-row {
  display: flex;
  gap: 1.2rem;
  justify-content: center;
  flex-wrap: wrap;
}

.diff-card {
  background: var(--surface);
  border: 2px solid var(--surface-border);
  border-radius: 1rem;
  padding: 1.2rem 1.6rem;
  cursor: pointer;
  text-align: center;
  min-width: 150px;
  transition: border-color 0.2s, box-shadow 0.2s, transform 0.15s;
  position: relative;
  backdrop-filter: blur(6px);
}
.diff-card:hover {
  border-color: rgba(255,255,255,0.3);
  transform: translateY(-3px);
  box-shadow: 0 8px 24px rgba(0,0,0,0.5);
}
.diff-card.selected {
  border-color: var(--gold);
  box-shadow: 0 0 16px rgba(245,158,11,0.6), 0 0 32px rgba(245,158,11,0.2);
}
.diff-card-label {
  font-size: 1.15rem;
  font-weight: bold;
  color: var(--text);
}
.diff-card-sub {
  font-size: 0.8rem;
  color: var(--muted);
  margin-top: 0.3rem;
}
.diff-card[data-id="bob-stanberry"] .diff-card-label {
  color: var(--gold);
}

.team-inputs {
  display: flex;
  gap: 2rem;
  flex-wrap: wrap;
  justify-content: center;
}

.form-group {
  display: flex;
  flex-direction: column;
  gap: 0.4rem;
}

.form-group label {
  font-size: 0.9rem;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.08em;
}

.form-group input {
  width: 220px;
  padding: 0.75rem 1rem;
  font-size: 1.1rem;
  background: var(--surface);
  color: var(--text);
  border: 2px solid var(--surface-border);
  border-radius: 0.6rem;
  font-family: 'Georgia', serif;
  transition: border-color 0.2s;
  backdrop-filter: blur(4px);
}
.form-group input:focus {
  outline: none;
  border-color: rgba(255,255,255,0.35);
}
.form-group input::placeholder {
  color: var(--muted);
}

.start-btn {
  padding: 1rem 2.5rem;
  font-size: 1.3rem;
  font-weight: bold;
  font-family: 'Georgia', serif;
  background: linear-gradient(135deg, #007a8a, #00b8d4, #00e5ff);
  color: #000c10;
  border: none;
  border-radius: 0.75rem;
  cursor: pointer;
  letter-spacing: 0.04em;
  transition: opacity 0.2s, transform 0.15s, box-shadow 0.2s;
  box-shadow: 0 0 24px rgba(0,229,255,0.5), 0 0 48px rgba(0,229,255,0.2);
}
.start-btn:hover:not(:disabled) {
  opacity: 0.9;
  transform: translateY(-2px);
  box-shadow: 0 0 40px rgba(0,229,255,0.8), 0 0 80px rgba(0,229,255,0.3);
}
.start-btn:disabled {
  opacity: 0.35;
  cursor: not-allowed;
}

/* ─── Scoreboard ──────────────────────────────── */
.scoreboard {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 1rem 1.5rem 0.5rem;
  background: rgba(0,0,0,0.3);
  border-bottom: 1px solid var(--surface-border);
  backdrop-filter: blur(8px);
  gap: 1rem;
  position: sticky;
  top: 0;
  z-index: 50;
}

.score-block {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0.1rem;
  min-width: 120px;
}
.score-block.team1 { color: var(--team1); }
.score-block.team2 { color: var(--team2); }

.score-name {
  font-size: 0.85rem;
  font-weight: bold;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  opacity: 0.8;
}
.score-value {
  font-size: 3.5rem;
  font-weight: bold;
  line-height: 1;
  filter: drop-shadow(0 0 8px currentColor);
}
.score-value.popping {
  animation: scorePop 0.5s ease both;
}

.scoreboard-center {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0.25rem;
}
.scoreboard-center .bp-logo-wrap {
  margin-bottom: 0.2rem;
}
.picking-label {
  font-size: 0.85rem;
  color: var(--muted);
}
.picking-team {
  font-size: 1rem;
  font-weight: bold;
  color: var(--gold);
}

/* ─── Battlefield Bar ─────────────────────────── */
.battlefield-wrap {
  position: relative;
  width: 100%;
  height: 12px;
  background: var(--surface);
  overflow: hidden;
}
.battlefield-bar {
  position: absolute;
  top: 0;
  left: 0;
  height: 100%;
  background: linear-gradient(90deg, #007a8a, var(--team1));
  transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
  box-shadow: 2px 0 16px rgba(0,229,255,0.9);
}
.battlefield-right {
  position: absolute;
  top: 0;
  right: 0;
  height: 100%;
  background: linear-gradient(270deg, #cc0055, var(--team2));
  transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
  box-shadow: -2px 0 16px rgba(255,45,120,0.9);
}
.battlefield-shimmer {
  animation: battlefieldShimmer 0.6s ease both;
}
@keyframes battlefieldShimmer {
  0%   { filter: brightness(1); }
  40%  { filter: brightness(2.5); }
  100% { filter: brightness(1); }
}

/* ─── Category Board ──────────────────────────── */
.category-board {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 2rem;
  flex: 1;
  gap: 2rem;
  animation: fadeIn 0.4s ease both;
}

.category-board-title {
  font-size: 1.3rem;
  color: var(--muted);
  text-align: center;
}
.category-board-title strong {
  font-size: 1.5rem;
  color: var(--gold);
}

.category-grid {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  grid-template-rows: 1fr 1fr;
  gap: 1.25rem;
  width: 100%;
  max-width: 800px;
  flex: 1;
}

.category-card {
  background: var(--surface);
  border: 2px solid var(--surface-border);
  border-radius: 1rem;
  padding: 1.5rem;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 0.75rem;
  cursor: pointer;
  transition: transform 0.15s, border-color 0.2s, box-shadow 0.2s;
  text-align: center;
  backdrop-filter: blur(6px);
  animation: fadeIn 0.4s ease both;
  position: relative;
  overflow: hidden;
}
.category-card:hover:not(.exhausted) {
  transform: translateY(-4px);
  border-color: rgba(255,255,255,0.35);
  box-shadow: 0 12px 32px rgba(0,0,0,0.6), 0 0 16px rgba(255,255,255,0.1);
}
.category-card.exhausted {
  opacity: 0.38;
  cursor: not-allowed;
  filter: grayscale(0.7);
}
.category-card-emoji {
  font-size: 2.2rem;
  line-height: 1;
}
.category-card-label {
  font-size: 1rem;
  font-weight: bold;
  letter-spacing: 0.03em;
}
.category-card-count {
  font-size: 0.75rem;
  color: var(--muted);
}
.exhausted-overlay {
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.55);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.8rem;
  color: var(--muted);
  border-radius: 1rem;
}

/* ─── Question Screen ─────────────────────────── */
.question-screen {
  display: flex;
  flex-direction: column;
  flex: 1;
  padding: 1.5rem 2rem;
  gap: 1.5rem;
  animation: fadeIn 0.35s ease both;
}

.question-category-badge {
  text-align: center;
  font-size: 0.85rem;
  color: var(--gold);
  text-transform: uppercase;
  letter-spacing: 0.12em;
}

.question-card {
  background: var(--surface);
  border: 1px solid var(--surface-border);
  border-radius: 1rem;
  padding: 2rem;
  text-align: center;
  font-size: 1.6rem;
  line-height: 1.5;
  backdrop-filter: blur(8px);
  box-shadow: 0 4px 24px rgba(0,0,0,0.4);
  max-width: 900px;
  margin: 0 auto;
  width: 100%;
}

.options-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1rem;
  max-width: 900px;
  margin: 0 auto;
  width: 100%;
}

.option-card {
  background: var(--surface);
  border: 2px solid var(--surface-border);
  border-radius: 0.75rem;
  padding: 1rem 1.25rem;
  font-size: 1.1rem;
  display: flex;
  align-items: center;
  gap: 0.75rem;
  backdrop-filter: blur(4px);
  transition: border-color 0.2s, box-shadow 0.2s;
  cursor: default;
}
.option-card.correct {
  border-color: var(--correct);
  background: rgba(34,197,94,0.12);
  color: var(--correct);
  animation: correctPulse 1.2s ease infinite;
}
.option-label {
  font-weight: bold;
  font-size: 0.9rem;
  min-width: 1.6rem;
  height: 1.6rem;
  border-radius: 50%;
  background: rgba(255,255,255,0.1);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}

/* ─── Buzz Buttons ────────────────────────────── */
.buzz-area {
  display: flex;
  gap: 1.5rem;
  margin-top: auto;
  max-width: 900px;
  margin-left: auto;
  margin-right: auto;
  width: 100%;
}

.buzz-btn {
  flex: 1;
  min-height: 120px;
  font-size: 1.4rem;
  font-weight: bold;
  font-family: 'Georgia', serif;
  border: none;
  border-radius: 1rem;
  cursor: pointer;
  color: white;
  letter-spacing: 0.03em;
  transition: opacity 0.15s, transform 0.15s, box-shadow 0.2s;
  text-shadow: 0 1px 4px rgba(0,0,0,0.5);
}
.buzz-btn[data-team="0"] {
  background: linear-gradient(135deg, #004a55, #00a0b8, #00e5ff);
  box-shadow: 0 0 28px rgba(0,229,255,0.5), inset 0 1px 0 rgba(255,255,255,0.15);
  color: #001820;
}
.buzz-btn[data-team="1"] {
  background: linear-gradient(135deg, #660028, #cc0055, #ff2d78);
  box-shadow: 0 0 28px rgba(255,45,120,0.5), inset 0 1px 0 rgba(255,255,255,0.1);
}
.buzz-btn:hover:not(:disabled) {
  transform: translateY(-2px);
  filter: brightness(1.15);
}
.buzz-btn[data-team="0"]:hover:not(:disabled) {
  box-shadow: 0 0 56px rgba(0,229,255,0.9), 0 0 100px rgba(0,229,255,0.3);
}
.buzz-btn[data-team="1"]:hover:not(:disabled) {
  box-shadow: 0 0 56px rgba(255,45,120,0.9), 0 0 100px rgba(255,45,120,0.3);
}
.buzz-btn:active:not(:disabled) {
  animation: buzzFlash 0.25s ease both;
}
.buzz-btn:disabled {
  opacity: 0.28;
  cursor: not-allowed;
  filter: grayscale(0.5);
}

/* ─── Reveal Area ─────────────────────────────── */
.reveal-area {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 1rem;
  margin-top: auto;
  max-width: 900px;
  margin-left: auto;
  margin-right: auto;
  width: 100%;
}

.buzzed-team-display {
  font-size: 1.4rem;
  font-weight: bold;
  text-align: center;
}
.buzzed-team-display.team1 { color: var(--team1); }
.buzzed-team-display.team2 { color: var(--team2); }

.flavor-text {
  font-size: 0.9rem;
  color: var(--muted);
  font-style: italic;
  text-align: center;
  min-height: 1.4em;
}

.verdict-buttons {
  display: flex;
  gap: 1rem;
  width: 100%;
}
.verdict-buttons button {
  flex: 1;
  padding: 1rem;
  font-size: 1.2rem;
  font-weight: bold;
  font-family: 'Georgia', serif;
  border: none;
  border-radius: 0.75rem;
  cursor: pointer;
  color: white;
  transition: opacity 0.2s, transform 0.15s;
}
.verdict-buttons button:hover {
  opacity: 0.85;
  transform: translateY(-1px);
}
#correct-btn {
  background: linear-gradient(135deg, #1a7a00, #28cc00, #39ff14);
  color: #001a00;
  box-shadow: 0 0 20px rgba(57,255,20,0.45);
}
#wrong-btn {
  background: linear-gradient(135deg, #660028, #cc0055, #ff2d78);
  box-shadow: 0 0 20px rgba(255,45,120,0.45);
}

/* ─── Second Chance Banner ────────────────────── */
.second-chance-banner {
  background: linear-gradient(135deg, rgba(245,158,11,0.15), rgba(245,158,11,0.05));
  border: 1px solid rgba(245,158,11,0.4);
  border-radius: 0.75rem;
  padding: 0.75rem 1.5rem;
  text-align: center;
  font-size: 1.1rem;
  font-weight: bold;
  color: var(--gold);
  max-width: 900px;
  margin: 0 auto;
  width: 100%;
  animation: fadeIn 0.3s ease both;
}

/* ─── Win Screen ──────────────────────────────── */
.win-screen {
  position: fixed;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: rgba(0,0,8,0.97);
  z-index: 200;
  gap: 1.5rem;
  padding: 2rem;
  text-align: center;
  animation: fadeIn 0.5s ease both;
  overflow: hidden;
}

.win-title {
  font-size: 1.2rem;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.15em;
}

.win-winner-name {
  font-size: 4rem;
  font-weight: bold;
  line-height: 1.1;
  animation: winGlow 2s ease infinite;
}
.win-winner-name.team1 { color: var(--team1); }
.win-winner-name.team2 { color: var(--team2); }

.win-tagline {
  color: var(--gold);
  font-style: italic;
  font-size: 1.1rem;
  opacity: 0.9;
}

.win-scores {
  display: flex;
  gap: 3rem;
  font-size: 1.5rem;
}
.win-score-block {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0.25rem;
}
.win-score-block.team1 { color: var(--team1); }
.win-score-block.team2 { color: var(--team2); }
.win-score-val {
  font-size: 3rem;
  font-weight: bold;
  line-height: 1;
}

.play-again-btn {
  padding: 1rem 2.5rem;
  font-size: 1.3rem;
  font-weight: bold;
  font-family: 'Georgia', serif;
  background: linear-gradient(135deg, #d97706, #f59e0b);
  color: #1a1000;
  border: none;
  border-radius: 0.75rem;
  cursor: pointer;
  animation: playAgainPulse 2s ease infinite;
  transition: transform 0.15s;
  margin-top: 0.5rem;
}
.play-again-btn:hover {
  transform: scale(1.05);
}

/* ─── Splash Screen ──────────────────────────── */
.splash-screen {
  position: fixed;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 2.5rem;
  background: linear-gradient(135deg, #050510 0%, #0d0020 50%, #050510 100%);
  z-index: 500;
  animation: fadeIn 0.6s ease both;
  text-align: center;
  padding: 2rem;
}
.splash-question {
  font-size: 4rem;
  font-weight: bold;
  letter-spacing: 0.06em;
  text-shadow: 0 0 40px rgba(0,229,255,0.9), 0 0 80px rgba(0,229,255,0.4), 0 0 140px rgba(255,45,120,0.25);
  line-height: 1.2;
}
.splash-sub {
  font-size: 1.1rem;
  color: var(--muted);
  font-style: italic;
}
.splash-buttons {
  display: flex;
  gap: 2rem;
}
.splash-yes {
  padding: 1.1rem 3rem;
  font-size: 1.5rem;
  font-weight: bold;
  font-family: 'Georgia', serif;
  background: linear-gradient(135deg, #004a55, #00b8d4, #00e5ff);
  color: #001820;
  border: none;
  border-radius: 0.75rem;
  cursor: pointer;
  box-shadow: 0 0 28px rgba(0,229,255,0.6), 0 0 56px rgba(0,229,255,0.2);
  transition: transform 0.15s, box-shadow 0.2s;
  letter-spacing: 0.05em;
}
.splash-yes:hover {
  transform: translateY(-3px) scale(1.04);
  box-shadow: 0 0 48px rgba(0,229,255,0.9), 0 0 96px rgba(0,229,255,0.4);
}
.splash-no {
  padding: 1.1rem 3rem;
  font-size: 1.5rem;
  font-weight: bold;
  font-family: 'Georgia', serif;
  background: var(--surface);
  color: var(--muted);
  border: 2px solid var(--surface-border);
  border-radius: 0.75rem;
  cursor: pointer;
  transition: transform 0.15s, opacity 0.2s;
}
.splash-no:hover {
  opacity: 0.7;
  transform: translateY(1px);
}

/* ─── Laser Mike Reveal ───────────────────────── */
@keyframes laserReveal {
  0%   { opacity: 0; filter: brightness(5) saturate(0) contrast(3); }
  15%  { opacity: 1; filter: brightness(2.5) saturate(0) contrast(2); }
  45%  { filter: brightness(1.5) saturate(0.15) contrast(1.4); }
  80%  { filter: brightness(1.1) saturate(0.7) contrast(1.1); }
  100% { filter: brightness(1) saturate(1) contrast(1); }
}
@keyframes neonVignette {
  0%, 100% { box-shadow: inset 0 0 80px rgba(0,229,255,0.15), inset 0 0 200px rgba(255,45,120,0.08); }
  50%       { box-shadow: inset 0 0 140px rgba(0,229,255,0.35), inset 0 0 300px rgba(255,45,120,0.18); }
}
.laser-screen {
  position: fixed;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  background: #000;
  z-index: 500;
  overflow: hidden;
}
.laser-img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  animation: laserReveal 3s ease-out both;
}
.laser-overlay {
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse at center, transparent 30%, rgba(0,0,0,0.75) 100%);
  pointer-events: none;
  animation: neonVignette 2s ease infinite;
}

/* ─── Confetti ────────────────────────────────── */
.confetti-piece {
  position: absolute;
  top: -30px;
  border-radius: 2px;
  animation: confettiFall linear infinite;
  pointer-events: none;
  z-index: 201;
}

    // ─── 2. Helpers ────────────────────────────────────────────────────────────
    function shuffle(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function escapeHtml(str) {
      return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    // ─── 4. Audio Module ───────────────────────────────────────────────────────
    let audioCtx = null;

    function getAudioCtx() {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      return audioCtx;
    }

    function playTone(freq, duration, type = 'sine', volume = 0.3, startDelay = 0) {
      if (state.muted) return;
      const ctx = getAudioCtx();
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.type = type;
      osc.frequency.setValueAtTime(freq, ctx.currentTime + startDelay);
      gain.gain.setValueAtTime(volume, ctx.currentTime + startDelay);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + startDelay + duration);
      osc.start(ctx.currentTime + startDelay);
      osc.stop(ctx.currentTime + startDelay + duration + 0.05);
    }

    function sfxBuzz()    { playTone(440, 0.2, 'square', 0.4); }
    function sfxCorrect() { playTone(523, 0.15, 'sine', 0.4); setTimeout(() => playTone(659, 0.2, 'sine', 0.4), 150); }
    function sfxWrong()   { playTone(200, 0.15, 'square', 0.3); setTimeout(() => playTone(150, 0.2, 'square', 0.3), 150); }
    function sfxPoint() {
      [523, 659, 784, 1047].forEach((f, i) => playTone(f, 0.1, 'sine', 0.35, i * 0.08));
    }
    function sfxWin() {
      [262, 330, 392, 523, 659, 784, 1047].forEach((f, i) => playTone(f, 0.15, 'sine', 0.4, i * 0.1));
    }

    let bgMusic = null;
    function initBgMusic() {

      }
    }
    function toggleMute() {
      state.muted = !state.muted;
      if (audioCtx) {
        state.muted ? audioCtx.suspend() : audioCtx.resume();
      }
      if (bgMusic) bgMusic.muted = state.muted;
      const btn = document.getElementById('mute-btn');
      if (btn) btn.textContent = state.muted ? '\uD83D\uDD07' : '\uD83D\uDD0A';
    }

    // ─── 10. Game Logic ────────────────────────────────────────────────────────
    function startGame() {
      const t1 = document.getElementById('team1-input')?.value.trim() || 'Team 1';
      const t2 = document.getElementById('team2-input')?.value.trim() || 'Team 2';
      state.team1 = t1;
      state.team2 = t2;
      state.scores = [0, 0];
      state.pickingTeam = 0;
      state.currentQuestion = null;
      state.currentCategory = null;
      state.buzzedTeam = null;
      state.usedQuestions = {};
      state.wrongFlavorIndex = 0;
      state.phase = 'category-board';
      initBgMusic();
      render();
    }

    function pickCategory(categoryId) {
      const q = getRandomQuestion(categoryId);
      if (!q) return;
      state.currentCategory = categoryId;
      state.currentQuestion = q;
      state.buzzedTeam = null;
      state.phase = 'buzz';
      render();
    }

    function getRandomQuestion(categoryId) {
      const pool = QUESTION_BANK[categoryId][state.difficulty];
      if (!state.usedQuestions[categoryId]) {
        state.usedQuestions[categoryId] = new Set();
      }
      const used = state.usedQuestions[categoryId];
      const available = pool.map((_, i) => i).filter(i => !used.has(i));
      if (available.length === 0) return null;
      const idx = available[Math.floor(Math.random() * available.length)];
      used.add(idx);
      const q = pool[idx];
      return {
        q: q.q,
        options: q.options,
        answer: q.answer,
        shuffledOptions: shuffle(q.options),
      };
    }

    function handleBuzz(teamIndex) {
      state.buzzedTeam = teamIndex;
      state.phase = 'reveal';
      sfxBuzz();
      render();
    }

    function handleCorrect() {
      const scoringTeam = state.buzzedTeam;
      state.scores[scoringTeam]++;
      sfxCorrect();
      sfxPoint();
      if (checkWin()) {
        state.phase = 'win';
        render();
        return;
      }
      advancePickingTeam();
      state.phase = 'category-board';
      render();
      const el = document.getElementById(`score-val-${scoringTeam}`);
      if (el) { void el.offsetWidth; el.classList.add('popping'); }
      document.querySelector('.battlefield-bar')?.classList.add('battlefield-shimmer');
      document.querySelector('.battlefield-right')?.classList.add('battlefield-shimmer');
    }

    function handleWrong() {
      sfxWrong();
      state.phase = 'second-chance';
      render();
      state.wrongFlavorIndex++;
    }

    function handleSecondChanceCorrect() {
      const otherTeam = state.buzzedTeam === 0 ? 1 : 0;
      state.scores[otherTeam]++;
      sfxCorrect();
      sfxPoint();
      if (checkWin()) {
        state.phase = 'win';
        render();
        return;
      }
      state.pickingTeam = otherTeam;
      state.phase = 'category-board';
      render();
      const el = document.getElementById(`score-val-${otherTeam}`);
      if (el) { void el.offsetWidth; el.classList.add('popping'); }
      document.querySelector('.battlefield-bar')?.classList.add('battlefield-shimmer');
      document.querySelector('.battlefield-right')?.classList.add('battlefield-shimmer');
    }

    function handleSecondChanceWrong() {
      sfxWrong();
      state.phase = 'category-board';
      render();
    }

    function advancePickingTeam() {
      state.pickingTeam = state.pickingTeam === 0 ? 1 : 0;
    }

    function checkWin() {
      return state.scores[0] >= WIN_SCORE || state.scores[1] >= WIN_SCORE;
    }

    // ─── 11. render() dispatch + bindEvents() ─────────────────────────────────
    function renderSplash() {
      const app = document.getElementById('app');
      app.innerHTML = `
        <div class="splash-screen">
          <div class="splash-question">Are you ready?</div>
          <p class="splash-sub">betterquizthanmichael.com</p>

            <button class="splash-yes" id="splash-yes">Yes</button>
            <button class="splash-no" id="splash-no">No</button>
          </div>
        </div>
      `;
      bindEvents();
    }

    function renderLaserMike() {
      const app = document.getElementById('app');
      app.innerHTML = `
        <div class="laser-screen">
          <img class="laser-img" src="laser-mike.JPG" alt="Laser Mike">
          <div class="laser-overlay"></div>
        </div>
      `;
      setTimeout(() => { state.phase = 'setup'; render(); }, 2500);
    }

    function render() {
      switch (state.phase) {
        case 'splash':         renderSplash();        break;
        case 'laser-reveal':   renderLaserMike();     break;
        case 'setup':          renderSetup();         break;
        case 'category-board': renderCategoryBoard(); break;
        case 'buzz':           renderQuestion();      break;
        case 'reveal':         renderReveal();        break;
        case 'second-chance':  renderSecondChance();  break;
        case 'win':            renderWin();           break;
      }
    }

    function bindEvents() {
      document.querySelectorAll('.diff-card').forEach(card => {
        card.addEventListener('click', () => {
          state.difficulty = card.dataset.id;
          document.querySelectorAll('.diff-card').forEach(c => c.classList.remove('selected'));
          card.classList.add('selected');
          const startBtn = document.getElementById('start-btn');
          if (startBtn) startBtn.disabled = false;
        });
      });

      document.getElementById('start-btn')?.addEventListener('click', (e) => {
        e.preventDefault();
        if (!state.difficulty) return;
        startGame();
      });

      document.querySelectorAll('.category-card:not(.exhausted)').forEach(card => {
        card.addEventListener('click', () => {
          pickCategory(card.dataset.category);
        });
      });

      document.querySelectorAll('.buzz-btn').forEach(btn => {
        btn.addEventListener('click', function() {
          if (this.disabled) return;
          handleBuzz(parseInt(this.dataset.team, 10));
        });
      });

      document.getElementById('correct-btn')?.addEventListener('click', handleCorrect);
      document.getElementById('wrong-btn')?.addEventListener('click', handleWrong);

      document.getElementById('sc-correct-btn')?.addEventListener('click', handleSecondChanceCorrect);
      document.getElementById('sc-wrong-btn')?.addEventListener('click', handleSecondChanceWrong);

      document.getElementById('play-again-btn')?.addEventListener('click', () => {
        state.phase = 'setup';
        render();
      });

      document.getElementById('mute-btn')?.addEventListener('click', toggleMute);

      document.getElementById('splash-yes')?.addEventListener('click', () => {
        sessionStorage.setItem('gameReady', '1');
        state.phase = 'laser-reveal';
        render();
      });

      document.getElementById('splash-no')?.addEventListener('click', () => {
        window.location.href = 'https://finance.yahoo.com';
      });
    }

    // ─── 12. Kick off ──────────────────────────────────────────────────────────
    state.phase = sessionStorage.getItem('gameReady') ? 'setup' : 'splash';
    render();
  </script>
</body>
</html>
